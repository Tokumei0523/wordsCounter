<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字数カウンター</title>
    <!-- 標準的なファビコン設定 -->
    <link rel="icon" href="favicon.ico">
    <!-- 高解像度（PNG）の設定 -->
    <link rel="icon" type="image/png" href="icon-192.png">
    <!-- iPhone用（Apple Touch Icon）の設定 -->
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f8f9fa;
            --border-color: #dee2e6;
            --text-color: #333;
            --sub-text-color: #6c757d;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h2 {
            text-align: left;
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 25px;
            color: var(--primary-color);
        }

        textarea {
            width: 100%;
            height: 300px;
            padding: 20px;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 15px;
            line-height: 1.6;
            resize: vertical;
            transition: all 0.2s ease;
            background-color: #fff;
        }

        textarea:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(44, 62, 80, 0.05);
        }

        .button-group {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            justify-content: space-between; /* 左右に配置 */
        }

        button {
            padding: 10px 24px;
            border: 1px solid var(--primary-color);
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .copy-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
        }

        .copy-btn:hover {
            background-color: #1a252f;
        }

        .clear-btn {
            background: transparent;
            color: var(--sub-text-color);
            border-color: var(--border-color);
        }

        .clear-btn:hover {
            background-color: #f1f3f5;
            color: var(--primary-color);
        }

        .stats {
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            border-top: 1px solid var(--border-color);
            padding-top: 30px;
            gap: 20px;
        }

        .stat-item {
            text-align: left;
        }

        .label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--sub-text-color);
            margin-bottom: 8px;
        }

        .count {
            display: block;
            font-size: 26px;
            font-weight: 300;
            color: var(--primary-color);
        }

        /* 空白なしを強調 */
        .primary-stat .label {
            color: var(--accent-color);
        }
        .primary-stat .count {
            color: var(--accent-color);
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>文字数カウンター</h2>
    <textarea id="inputText" placeholder="文章を入力または貼り付けてください..."></textarea>
    
    <div class="button-group">
        <button class="clear-btn" id="clearBtn">内容をクリア</button>
        <button class="copy-btn" id="copyBtn">文章をコピー</button>
    </div>

    <div class="stats">
        <div class="stat-item primary-stat">
            <span class="label">文字数 (空白なし)</span>
            <span id="charNoSpaceCount" class="count">0</span>
        </div>
        <div class="stat-item">
            <span class="label">文字数 (空白あり)</span>
            <span id="charCount" class="count">0</span>
        </div>
        <div class="stat-item">
            <span class="label">英単語数</span>
            <span id="wordCount" class="count">0</span>
        </div>
        <div class="stat-item">
            <span class="label">行数</span>
            <span id="lineCount" class="count">0</span>
        </div>
    </div>
</div>

<script>
    const textArea = document.getElementById('inputText');
    const wordCount = document.getElementById('wordCount');
    const charCount = document.getElementById('charCount');
    const charNoSpaceCount = document.getElementById('charNoSpaceCount');
    const lineCount = document.getElementById('lineCount');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');

    function updateCounts() {
        const fullText = textArea.value;
        const trimmedText = fullText.trim();

        // 文字数 (空白なし)
        const noSpaceText = fullText.replace(/\s+/g, '');
        charNoSpaceCount.textContent = noSpaceText.length;

        // 文字数 (空白込み)
        charCount.textContent = fullText.length;

        // 英単語数
        const words = trimmedText.match(/\b[-a-zA-Z0-9']+\b/g);
        wordCount.textContent = words ? words.length : 0;

        // 行数
        lineCount.textContent = fullText ? fullText.split(/\r\n|\r|\n/).length : 0;

        // 自動保存
        localStorage.setItem('smartCounterTextJP', fullText);
    }

    textArea.addEventListener('input', updateCounts);

    window.addEventListener('DOMContentLoaded', () => {
        const savedData = localStorage.getItem('smartCounterTextJP');
        if (savedData) {
            textArea.value = savedData;
            updateCounts();
        }
    });

    copyBtn.addEventListener('click', () => {
        if (!textArea.value) return;
        navigator.clipboard.writeText(textArea.value).then(() => {
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "コピー完了";
            setTimeout(() => {
                copyBtn.innerText = originalText;
            }, 1500);
        });
    });

    clearBtn.addEventListener('click', () => {
        if (textArea.value && confirm("内容をすべて消去しますか？")) {
            textArea.value = "";
            updateCounts();
        }
    });
</script>

</body>
</html>
